# Zenput GitHub Actions CI
#
# This workflow is the public, OSS-facing CI for zenput. It mirrors the Azure
# Pipeline (`AzCICD.yml`) and shares the same npm scripts as its single source
# of truth — drift between the two systems is therefore minimized.
#
# Jobs:
#   - lint        : ESLint (flat config) + Prettier check
#   - type-check  : tsc --noEmit
#   - test        : Vitest + coverage → Codecov + SonarCloud
#   - build       : Rollup library build (dist/)
#   - storybook   : Storybook static build (storybook-static/)
#   - a11y        : @storybook/test-runner + axe against built Storybook
#   - publish     : npm publish (release branches only, retained from previous CI)
name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main
      - 'release/**'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: 'true'
  FORCE_COLOR: '1'

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --ignore-scripts
      - run: npm run lint

  type-check:
    name: Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --ignore-scripts
      - run: npm run type-check

  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
      - run: npm ci --ignore-scripts
      - run: npm run test:ci
      - name: Upload coverage artifact
        if: matrix.node == '20'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: warn
      - name: Upload JUnit results
        if: matrix.node == '20'
        uses: actions/upload-artifact@v4
        with:
          name: junit
          path: reports/junit.xml
          if-no-files-found: warn
      - name: SonarQube / SonarCloud scan
        if: matrix.node == '20' && env.SONAR_TOKEN != ''
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build:
    name: Build library
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --ignore-scripts
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  storybook:
    name: Build Storybook
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --ignore-scripts
      - run: npm run build-storybook
      - uses: actions/upload-artifact@v4
        with:
          name: storybook-static
          path: storybook-static/
          if-no-files-found: error

  a11y:
    name: Storybook a11y (axe)
    runs-on: ubuntu-latest
    needs: storybook
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --ignore-scripts
      - uses: actions/download-artifact@v8
        with:
          name: storybook-static
          path: storybook-static
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Serve Storybook and run test-runner
        run: |
          npx http-server storybook-static -p 6006 -s &
          SERVER_PID=$!
          npx wait-on http://127.0.0.1:6006 --timeout 60000
          npx test-storybook --url http://127.0.0.1:6006
          kill "$SERVER_PID" || true

  # ─────────────────────────────────────────────────────────────────────────────
  # Publish to npm — preserved from previous workflow. Runs only on release/**
  # pushes and requires manual approval via the "npm-publish" GitHub Environment.
  # ─────────────────────────────────────────────────────────────────────────────
  publish:
    name: Publish to npm
    needs: [lint, type-check, test, build]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/release/')
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
      - run: npm ci --ignore-scripts
      - run: npm run build
      - name: Publish
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
