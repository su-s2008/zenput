trigger:
  branches:
    include:
      - master
      - release/*

pr:
  branches:
    include:
      - '*'

variables:
  # Node 24 — SonarCloud scanner requires Node 20+ and warns on older LTS
  nodeVersion: '24'
  # Point to the Java 17 you installed for SonarCloud
  JAVA_HOME: /usr/lib/jvm/java-21-openjdk-arm64
  VERCEL_ENV: 'production'

stages:
  - stage: Build
    displayName: 'Build & Test'
    jobs:
      - job: BuildAndTest
        displayName: 'Build, Lint, Test & Scan'
        pool:
          name: default
          demands:
            - Agent.OS -equals Linux
        workspace:
          clean: none   # self-hosted: preserve node_modules & incremental artifacts between runs
        steps:
          - checkout: self
            fetchDepth: 0

          # Use NVM instead of UseNode task for better ARM64 compatibility.
          # Only install the Node version if it isn't already present on the self-hosted agent.
          - script: |
              export NVM_DIR="$HOME/.nvm"
              [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
              if ! nvm use $(nodeVersion) >/dev/null 2>&1; then
                echo "Node $(nodeVersion) not installed on agent; installing..."
                nvm install $(nodeVersion)
                nvm use $(nodeVersion)
              fi
              echo "Using Node $(node --version) / npm $(npm --version)"
              echo "##vso[task.prependpath]$(dirname $(which node))"
            displayName: 'Set up Node.js via NVM'

          # Self-hosted agent retains node_modules between runs. Only re-install when the
          # lockfile changed (or node_modules is missing). Falls back to `npm ci` for a
          # clean, reproducible tree; uses offline cache for speed.
          - script: |
              set -e
              if [ -d node_modules ] && [ -f node_modules/.package-lock.json ] \
                  && cmp -s package-lock.json node_modules/.package-lock.json; then
                echo "Dependencies already match package-lock.json - skipping install."
              else
                echo "Installing root dependencies with npm ci..."
                npm ci --prefer-offline --no-audit --no-fund
              fi
            displayName: 'Install dependencies'

          - script: npm run type-check
            displayName: 'Type check'

          - script: npm run lint
            displayName: 'Lint'

          - script: npm run test:coverage
            displayName: 'Test with coverage'

          - script: npm run build
            displayName: 'Build'

          - script: |
              set -e
              if [ -d node_modules ] && [ -f node_modules/.package-lock.json ] \
                  && cmp -s package-lock.json node_modules/.package-lock.json; then
                echo "Demo dependencies already match package-lock.json - skipping install."
              else
                echo "Installing demo dependencies with npm ci..."
                npm ci --prefer-offline --no-audit --no-fund
              fi
            displayName: 'Install demo dependencies'
            workingDirectory: demo

          - script: npm run build
            displayName: 'Build demo site'
            workingDirectory: demo

          - task: PublishPipelineArtifact@1
            displayName: 'Publish demo site artifact'
            inputs:
              targetPath: 'demo/dist'
              artifact: 'demo-site'

          - task: SonarCloudPrepare@4
            displayName: 'SonarCloud Prepare'
            inputs:
              SonarCloud: 'SonarQube'
              organization: 'konarsubhojit'
              scannerMode: 'CLI'
              configMode: 'file'
            env:
              JAVA_HOME: $(JAVA_HOME)

          - task: SonarCloudAnalyze@4
            displayName: 'SonarCloud Analyze'
            env:
              JAVA_HOME: $(JAVA_HOME)

          - task: SonarCloudPublish@4
            displayName: 'SonarCloud Publish'

  - stage: DeployDemoToVercel
    displayName: 'Deploy demo to Vercel'
    dependsOn: Build
    condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'), eq(variables['Build.SourceBranch'], 'refs/heads/master'))
    jobs:
      - job: DeployVercel
        displayName: 'Deploy Vite demo'
        pool:
          name: default
          demands:
            - Agent.OS -equals Linux
        steps:
          - checkout: self

          - script: |
              export NVM_DIR="$HOME/.nvm"
              [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
              if ! nvm use $(nodeVersion) >/dev/null 2>&1; then
                echo "Node $(nodeVersion) not installed on agent; installing..."
                nvm install $(nodeVersion)
                nvm use $(nodeVersion)
              fi
              echo "##vso[task.prependpath]$(dirname $(which node))"
            displayName: 'Set up Node.js via NVM'

          - script: npm install -g vercel
            displayName: 'Install Vercel CLI'

          - script: vercel pull --yes --environment=$(VERCEL_ENV) --token=$(VERCEL_TOKEN)
            displayName: 'Pull Vercel project settings'
            env:
              VERCEL_ORG_ID: $(VERCEL_ORG_ID)
              VERCEL_PROJECT_ID: $(VERCEL_PROJECT_ID)
              VERCEL_TOKEN: $(VERCEL_TOKEN)

          - script: vercel build --prod --token=$(VERCEL_TOKEN)
            displayName: 'Build Vercel deployment'
            env:
              VERCEL_ORG_ID: $(VERCEL_ORG_ID)
              VERCEL_PROJECT_ID: $(VERCEL_PROJECT_ID)
              VERCEL_TOKEN: $(VERCEL_TOKEN)

          - script: vercel deploy --prebuilt --prod --token=$(VERCEL_TOKEN)
            displayName: 'Deploy to Vercel'
            env:
              VERCEL_ORG_ID: $(VERCEL_ORG_ID)
              VERCEL_PROJECT_ID: $(VERCEL_PROJECT_ID)
              VERCEL_TOKEN: $(VERCEL_TOKEN)

  - stage: Publish
    displayName: 'Publish to npm'
    dependsOn: Build
    condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'), startsWith(variables['Build.SourceBranch'], 'refs/heads/release/'))
    jobs:
      - deployment: PublishNpm
        displayName: 'Publish to npm registry'
        pool:
          name: default
        environment: 'npm-publish'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - script: |
                    export NVM_DIR="$HOME/.nvm"
                    [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
                    if ! nvm use $(nodeVersion) >/dev/null 2>&1; then
                      echo "Node $(nodeVersion) not installed on agent; installing..."
                      nvm install $(nodeVersion)
                      nvm use $(nodeVersion)
                    fi
                    echo "##vso[task.prependpath]$(dirname $(which node))"
                  displayName: 'Set up Node.js via NVM'

                - script: |
                    set -e
                    if [ -d node_modules ] && [ -f node_modules/.package-lock.json ] \
                        && cmp -s package-lock.json node_modules/.package-lock.json; then
                      echo "Dependencies already match package-lock.json - skipping install."
                    else
                      npm ci --prefer-offline --no-audit --no-fund
                    fi
                  displayName: 'Install dependencies'

                - script: npm run build
                  displayName: 'Build'

                - script: |
                    echo "//registry.npmjs.org/:_authToken=$(NPM_TOKEN)" > .npmrc
                    npm publish --access public --provenance
                  displayName: 'Publish to npm'
                  env:
                    NPM_TOKEN: $(NPM_TOKEN)
