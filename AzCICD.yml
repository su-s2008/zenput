trigger:
  branches:
    include:
      - master
      - release/*

pr:
  branches:
    include:
      - '*'

variables:
  # Updated to 22 as it's the current stable LTS for 2026
  nodeVersion: '22' 
  npm_config_cache: $(Pipeline.Workspace)/.npm
  # Point to the Java 17 you installed for SonarCloud
  JAVA_HOME: /usr/lib/jvm/java-21-openjdk-arm64

stages:
  - stage: Build
    displayName: 'Build & Test'
    jobs:
      - job: BuildAndTest
        displayName: 'Build, Lint, Test & Scan'
        pool:
          name: default
          demands:
            - Agent.OS -equals Linux
        steps:
          - checkout: self
            fetchDepth: 0

          # Use NVM instead of UseNode task for better ARM64 compatibility
          - script: |
              export NVM_DIR="$HOME/.nvm"
              [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
              nvm install $(nodeVersion)
              nvm use $(nodeVersion)
              echo "##vso[task.prependpath]$PATH"
            displayName: 'Set up Node.js via NVM'

          - task: Cache@2
            displayName: 'Cache npm packages'
            inputs:
              key: 'npm | "$(Agent.OS)" | package-lock.json'
              restoreKeys: |
                npm | "$(Agent.OS)"
              path: $(npm_config_cache)

          - script: npm ci
            displayName: 'Install dependencies'

          - script: npm run type-check
            displayName: 'Type check'

          - script: npm run lint
            displayName: 'Lint'

          - script: npm run test:coverage
            displayName: 'Test with coverage'

          - script: npm run build
            displayName: 'Build'

          # SonarCloud needs JAVA_HOME to be set to JDK 17
          - task: SonarCloudPrepare@3
            displayName: 'SonarCloud Prepare'
            inputs:
              SonarCloud: 'SonarQube'
              organization: 'konarsubhojit'
              scannerMode: 'CLI'
              configMode: 'file'
            env:
              JAVA_HOME: $(JAVA_HOME)

          - task: SonarCloudAnalyze@3
            displayName: 'SonarCloud Analyze'
            env:
              JAVA_HOME: $(JAVA_HOME)

          - task: SonarCloudPublish@3
            displayName: 'SonarCloud Publish'

  - stage: Publish
    displayName: 'Publish to npm'
    dependsOn: Build
    condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'), startsWith(variables['Build.SourceBranch'], 'refs/heads/release/'))
    jobs:
      - deployment: PublishNpm
        displayName: 'Publish to npm registry'
        pool:
          name: default
        environment: 'npm-publish'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - script: |
                    export NVM_DIR="$HOME/.nvm"
                    [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
                    nvm use $(nodeVersion)
                    echo "##vso[task.prependpath]$PATH"
                  displayName: 'Set up Node.js via NVM'

                - script: npm ci
                  displayName: 'Install dependencies'

                - script: npm run build
                  displayName: 'Build'

                - script: |
                    echo "//registry.npmjs.org/:_authToken=$(NPM_TOKEN)" > .npmrc
                    npm publish --access public --provenance
                  displayName: 'Publish to npm'
                  env:
                    NPM_TOKEN: $(NPM_TOKEN)