# ═════════════════════════════════════════════════════════════════════════════
# Zenput — Azure Pipeline (single self-hosted agent, ARM64-optimized)
#
# This pipeline targets a single self-hosted Linux agent (Oracle Cloud Ampere
# A1, 4 vCPU ARM64 / 24 GB RAM). All stages run on the same machine, which
# means:
#
#   - Node, npm cache and Playwright browsers only need to be set up once.
#   - Workspace state (node_modules, dist/, storybook-static/) is reused
#     between steps — no artifact hand-off needed inside a single job.
#
# CPU-budget rule: at most 2 CPU-heavy Node processes run in parallel at any
# time (1 vCPU reserved for the OS, 1 for background I/O).
#
# Parallelised steps (2-way):
#   lint + type-check  run concurrently  (disjoint outputs, low I/O overlap)
#
# The pipeline still mirrors the GitHub Actions workflow
# (.github/workflows/ci.yml) — both systems invoke the same npm scripts as a
# single source of truth:
#
#     npm run lint  ╮ (parallel)
#     npm run type-check  ╯  →  npm run test:ci  →  npm run build
#
# ── Agent requirements ──────────────────────────────────────────────────────
#   Pool:          "Default" (self-hosted). Adjust `pool.name` below if yours
#                  is named differently.
#   OS:            Linux ARM64 / aarch64 (Oracle Cloud Ampere A1).
#   Pre-installed: git, nvm, npm 10+. Playwright Chromium browsers
#                  are in `/home/ubuntu/.cache/ms-playwright`. Vercel CLI and
#                  http-server are installed globally on the agent.
#                  Node is selected via `nvm install 24 && nvm use 24` in the
#                  pipeline (do not rely on the agent's default Node — vitest 4
#                  / rolldown require Node ^20.19.0 || >=22.12.0).
#
# ── Pipeline variables / service connections ────────────────────────────────
#   SonarCloud service connection : "SonarCloud"
#   SONAR_TOKEN   : optional — Sonar steps are gated behind
#                   ne(variables['SONAR_TOKEN'], '')
#   CODECOV_TOKEN : optional
#   NPM_TOKEN     : required only by the "Publish" stage
#   VERCEL_TOKEN / VERCEL_ORG_ID / VERCEL_PROJECT_ID : required by the
#                   "DeployDemoToVercel" stage (demo site)
#
# ── Running the same steps locally ──────────────────────────────────────────
#   npm ci
#   npm run lint
#   npm run type-check
#   npm run test:ci
#   npm run build
#   npm run build-storybook
# ═════════════════════════════════════════════════════════════════════════════

trigger:
  branches:
    include:
      - master
      - release/*

# Do not trigger the pipeline for pull requests — CI coverage for PRs is
# handled by the GitHub Actions workflow (.github/workflows/ci.yml).
pr: none

# Weekly "clean" run — guards against stale state on a long-lived self-hosted
# agent. Regular CI runs skip the nuke (see `workspace.clean` below).
schedules:
  - cron: '0 6 * * 1'        # Mondays 06:00 UTC
    displayName: Weekly clean rebuild
    branches:
      include: [master]
    always: true

variables:
  - name: npm_config_cache
    value: /home/ubuntu/.npm
  - name: PLAYWRIGHT_BROWSERS_PATH
    value: /home/ubuntu/.cache/ms-playwright
  - name: CI
    value: 'true'
  - name: FORCE_COLOR
    value: '1'
  - name: VERCEL_ENV
    value: 'production'

pool:
  name: Default              # self-hosted pool — rename if your pool differs
  demands:
    - Agent.OS -equals Linux # adjust for Windows/macOS self-hosted agents

stages:
  - stage: CI
    displayName: 'CI (lint+typecheck ∥ → test → build → a11y)'
    jobs:
      # All CI runs in a single job on the single self-hosted agent.
      # Lint and type-check run concurrently (2-way); remaining steps
      # execute in order, reusing node_modules and build outputs.
      - job: CI
        displayName: 'Lint+type-check (parallel), test, build, a11y'
        timeoutInMinutes: 60
        workspace:
          clean: outputs       # only wipe build outputs between runs
        steps:
          - checkout: self
            clean: false       # keep node_modules/checkout between runs for speed
            fetchDepth: 1

          # ── Node toolchain (pin to a vitest 4 / rolldown-compatible version) ─
          # Self-hosted agent uses nvm; install/select Node 24 and prepend it to
          # PATH so all subsequent script steps in this job use it.
          - script: |
              set -e
              export NVM_DIR="${NVM_DIR:-$HOME/.nvm}"
              # shellcheck disable=SC1091
              . "$NVM_DIR/nvm.sh"
              nvm install 24
              nvm use 24
              NODE_BIN_DIR="$(dirname "$(nvm which 24)")"
              echo "##vso[task.prependpath]$NODE_BIN_DIR"
              echo "Selected Node: $(node -v) at $NODE_BIN_DIR"
            displayName: 'Use Node 24.x (via nvm)'

          # ── Toolchain verification ──────────────────────────────────────
          - script: |
              set -e
              echo "Node: $(node -v)"
              echo "npm:  $(npm -v)"
              echo "npm cache: $(npm_config_cache)"
            displayName: 'Verify toolchain'

          - script: npm ci --prefer-offline --no-audit --fund=false
            displayName: 'Install dependencies (npm ci)'

          # ── Lint & type-check (parallel, 2-way) ────────────────────────
          - script: |
              set -uo pipefail
              npm run lint       > lint.log       2>&1 & PID1=$!
              npm run type-check > type-check.log 2>&1 & PID2=$!
              FAIL=0
              wait $PID1 || FAIL=1
              wait $PID2 || FAIL=1
              echo "───── lint.log ─────";       cat lint.log
              echo "───── type-check.log ─────"; cat type-check.log
              exit $FAIL
            displayName: 'Lint + type-check (parallel, 2-way)'

          # ── Test (Vitest + coverage) ────────────────────────────────────
          - task: SonarCloudPrepare@3
            displayName: 'SonarCloud Prepare'
            condition: and(succeeded(), ne(variables['SONAR_TOKEN'], ''))
            inputs:
              SonarCloud: 'SonarCloud'
              organization: 'konarsubhojit'
              scannerMode: 'CLI'
              configMode: 'file'

          - script: npm run test:ci
            displayName: 'Test (Vitest + coverage)'

          - task: PublishTestResults@2
            displayName: 'Publish JUnit results'
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: 'reports/junit.xml'
              mergeTestResults: true
              failTaskOnFailedTests: true

          - task: PublishPipelineArtifact@1
            displayName: 'Publish coverage/ (html + lcov)'
            condition: succeededOrFailed()
            inputs:
              targetPath: 'coverage'
              artifact: 'coverage'

          - task: SonarCloudAnalyze@3
            displayName: 'SonarCloud Analyze'
            condition: and(succeeded(), ne(variables['SONAR_TOKEN'], ''))

          - task: SonarCloudPublish@3
            displayName: 'SonarCloud Publish'
            condition: and(succeeded(), ne(variables['SONAR_TOKEN'], ''))
            inputs:
              pollingTimeoutSec: '300'

          # ── Build (library + Storybook) ─────────────────────────────────
          - script: npm run build
            displayName: 'Build library (rollup)'

          - script: npm run build-storybook
            displayName: 'Build Storybook'

          - task: PublishPipelineArtifact@1
            displayName: 'Publish dist/'
            inputs:
              targetPath: 'dist'
              artifact: 'dist'

          - task: PublishPipelineArtifact@1
            displayName: 'Publish storybook-static/'
            inputs:
              targetPath: 'storybook-static'
              artifact: 'storybook-static'

          # ── Storybook a11y (axe via @storybook/test-runner) ─────────────
          - script: |
              set -e
              echo "Using PLAYWRIGHT_BROWSERS_PATH=$PLAYWRIGHT_BROWSERS_PATH"
              CHROMIUM_DIR="$(find "$PLAYWRIGHT_BROWSERS_PATH" -maxdepth 1 \( -name 'chromium-*' -o -name 'chromium_headless_shell-*' \) -type d 2>/dev/null | head -1)"
              if [ -z "$CHROMIUM_DIR" ]; then
                echo "Playwright Chromium not found. Installing..."
                # Omit --with-deps: system dependencies are pre-installed on this agent.
                npx playwright install chromium
              else
                echo "Playwright Chromium already installed at $CHROMIUM_DIR"
              fi
            displayName: 'Ensure Playwright Chromium exists (fallback install)'

          - script: |
              set -e
              npx http-server storybook-static -p 6006 -s &
              SERVER_PID=$!
              npx wait-on http://127.0.0.1:6006 --timeout 60000
              npx test-storybook --url http://127.0.0.1:6006
              kill "$SERVER_PID" || true
            displayName: 'Storybook a11y (axe)'

  # ───────────────────────────────────────────────────────────────────────────
  # Deploy the demo site (demo/) to Vercel.
  # Runs only on master pushes (never on PRs) and only after CI passes.
  # Requires VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID pipeline secrets.
  # ───────────────────────────────────────────────────────────────────────────
  - stage: DeployDemoToVercel
    displayName: 'Deploy demo to Vercel'
    dependsOn: CI
    condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'), or(eq(variables['Build.SourceBranch'], 'refs/heads/master'), eq(variables['Build.SourceBranch'], 'refs/heads/main')))
    jobs:
      - job: DeployVercel
        displayName: 'Deploy Vite demo'
        steps:
          - checkout: self
            clean: false

          # ── Node toolchain (Vite 8 requires Node ^20.19.0 || >=22.12.0) ──
          - script: |
              set -e
              export NVM_DIR="${NVM_DIR:-$HOME/.nvm}"
              # shellcheck disable=SC1091
              . "$NVM_DIR/nvm.sh"
              nvm install 24
              nvm use 24
              NODE_BIN_DIR="$(dirname "$(nvm which 24)")"
              echo "##vso[task.prependpath]$NODE_BIN_DIR"
              echo "Selected Node: $(node -v) at $NODE_BIN_DIR"
            displayName: 'Use Node 24.x (via nvm)'

          - script: vercel pull --yes --environment=$(VERCEL_ENV) --token=$(VERCEL_TOKEN)
            displayName: 'Pull Vercel project settings'
            env:
              VERCEL_ORG_ID: $(VERCEL_ORG_ID)
              VERCEL_PROJECT_ID: $(VERCEL_PROJECT_ID)

          - script: vercel build --prod --token=$(VERCEL_TOKEN)
            displayName: 'Build Vercel deployment'
            env:
              VERCEL_ORG_ID: $(VERCEL_ORG_ID)
              VERCEL_PROJECT_ID: $(VERCEL_PROJECT_ID)

          - script: vercel deploy --prebuilt --prod --token=$(VERCEL_TOKEN)
            displayName: 'Deploy to Vercel'
            env:
              VERCEL_ORG_ID: $(VERCEL_ORG_ID)
              VERCEL_PROJECT_ID: $(VERCEL_PROJECT_ID)

  # ───────────────────────────────────────────────────────────────────────────
  # Optional publish stage — retained from previous pipeline configuration.
  # Runs only on pushes to release/** branches, and only after CI passes.
  # ───────────────────────────────────────────────────────────────────────────
  - stage: Publish
    displayName: 'Publish to npm'
    dependsOn: CI
    condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'), startsWith(variables['Build.SourceBranch'], 'refs/heads/release/'))
    jobs:
      - deployment: PublishNpm
        displayName: 'Publish to npm registry'
        environment: 'npm-publish'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                  clean: false
                - script: |
                    set -e
                    export NVM_DIR="${NVM_DIR:-$HOME/.nvm}"
                    # shellcheck disable=SC1091
                    . "$NVM_DIR/nvm.sh"
                    nvm install 24
                    nvm use 24
                    NODE_BIN_DIR="$(dirname "$(nvm which 24)")"
                    echo "##vso[task.prependpath]$NODE_BIN_DIR"
                    echo "Selected Node: $(node -v) at $NODE_BIN_DIR"
                  displayName: 'Use Node 24.x (via nvm)'
                - script: npm ci --prefer-offline --no-audit --fund=false
                  displayName: 'npm ci'
                - script: npm run build
                  displayName: 'Build'
                - script: |
                    echo "//registry.npmjs.org/:_authToken=$(NPM_TOKEN)" > .npmrc
                    npm publish --access public --provenance
                  displayName: 'npm publish'
                  env:
                    NPM_TOKEN: $(NPM_TOKEN)
